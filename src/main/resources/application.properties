spring.application.name=deploymentdemo

# PostgreSQL datasource (override via environment variables if needed)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/employee_db}
spring.datasource.username=${DB_USER:empuser}
spring.datasource.password=${DB_PASSWORD:emppass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
